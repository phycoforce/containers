---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Test Version

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: Version
        required: true

permissions:
  contents: read

jobs:
  test-version:
    name: Test Version (${{ inputs.version }})
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Get App Versions
        uses: ./.github/actions/app-versions
        id: app-versions
        with:
          upstream-version: ${{ inputs.version }}

      - name: Check Version Results
        env:
          INPUT_VERSION: ${{ inputs.version }}
          IS_VALID_SEMVER: ${{ steps.app-versions.outputs.is-valid-semver }}
          SEMANTIC_VERSION: ${{ steps.app-versions.outputs.semantic }}
          RAW_VERSION: ${{ steps.app-versions.outputs.raw }}
        run: |-
          echo "Input Version: ${INPUT_VERSION}"
          echo "Is Valid Semver: ${IS_VALID_SEMVER}"
          echo "Semantic Version: ${SEMANTIC_VERSION}"
          echo "Raw Version: ${RAW_VERSION}"
